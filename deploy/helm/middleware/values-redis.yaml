# ============================================================
# Redis 7.x Helm Values
# Chart: bitnami/redis
# Namespace: middleware
# Sprint: S0-02
# ============================================================

# 主从模式（sentinel 高可用）
architecture: replication

auth:
  enabled: true
  # 密码通过 K8s Secret 注入，此处为占位
  existingSecret: tianjing-redis-secret
  existingSecretPasswordKey: redis-password

master:
  persistence:
    enabled: true
    size: 20Gi
    storageClass: "standard"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi

replica:
  replicaCount: 2
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

sentinel:
  enabled: true
  masterSet: tianjing-redis-master
  quorum: 2

# Redis 配置
commonConfiguration: |-
  maxmemory 1536mb
  maxmemory-policy allkeys-lru
  # 禁用持久化（CLAUDE.md §2.4：Redis 禁止用作持久化存储）
  save ""
  appendonly no
  # TCP 连接数
  maxclients 10000
  # 慢查询日志（超过 1ms 记录）
  slowlog-log-slower-than 1000

# 指标
metrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
