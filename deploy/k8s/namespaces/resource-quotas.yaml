# ============================================================
# 天柱·天镜 · 工业视觉 AI 推理平台
# ResourceQuota 资源配额（Sprint 0 · S0-01，CPU Only 模式）
# 说明：GPU Operator 未安装，V2.0 实验室阶段所有配额为 CPU-Only
#        GPU 到货后（Sprint 5）在 production/sandbox 追加 GPU limits
# ============================================================

# ==============================
# production 命名空间资源配额
# ==============================
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tianjing-production-quota
  namespace: production
spec:
  hard:
    # CPU 配额（生产服务优先分配）
    requests.cpu: "32"
    limits.cpu: "64"
    # 内存配额
    requests.memory: "64Gi"
    limits.memory: "128Gi"
    # 存储配额
    requests.storage: "500Gi"
    # Pod 数量上限
    pods: "100"
    # Service 数量
    services: "50"
    # ConfigMap 数量
    configmaps: "100"
    # Secret 数量
    secrets: "100"
    # PVC 数量
    persistentvolumeclaims: "30"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: tianjing-production-limits
  namespace: production
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "8"
        memory: "16Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: Pod
      max:
        cpu: "16"
        memory: "32Gi"

# ==============================
# sandbox 命名空间资源配额
# ==============================
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tianjing-sandbox-quota
  namespace: sandbox
spec:
  hard:
    # Sandbox 资源不超过 production 的 50%（CLAUDE.md §11 门禁要求）
    requests.cpu: "16"
    limits.cpu: "32"
    requests.memory: "32Gi"
    limits.memory: "64Gi"
    requests.storage: "200Gi"
    pods: "50"
    services: "30"
    configmaps: "50"
    secrets: "50"
    persistentvolumeclaims: "15"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: tianjing-sandbox-limits
  namespace: sandbox
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "50m"
        memory: "64Mi"

# ==============================
# training 命名空间资源配额
# ==============================
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tianjing-training-quota
  namespace: training
spec:
  hard:
    # 训练环境 CPU Only（Sprint 0-4），GPU 到货后移除 cpu 限制，改为 GPU 配额
    requests.cpu: "48"
    limits.cpu: "96"
    requests.memory: "96Gi"
    limits.memory: "192Gi"
    requests.storage: "2Ti"
    pods: "30"
    services: "20"
    configmaps: "50"
    secrets: "50"
    persistentvolumeclaims: "20"

# ==============================
# monitoring 命名空间资源配额
# ==============================
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tianjing-monitoring-quota
  namespace: monitoring
spec:
  hard:
    requests.cpu: "8"
    limits.cpu: "16"
    requests.memory: "16Gi"
    limits.memory: "32Gi"
    requests.storage: "500Gi"
    pods: "30"

# ==============================
# middleware 命名空间资源配额
# ==============================
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tianjing-middleware-quota
  namespace: middleware
spec:
  hard:
    requests.cpu: "16"
    limits.cpu: "32"
    requests.memory: "64Gi"
    limits.memory: "128Gi"
    requests.storage: "1Ti"
    pods: "50"
    services: "30"
    persistentvolumeclaims: "30"
