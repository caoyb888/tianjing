# =============================================================================
# 天柱·天镜 本地开发 API 网关（Nginx 反向代理）
# 监听端口：8079（vite.config.ts 中 /api 代理目标）
# 后端服务运行在宿主机，通过 host.docker.internal 访问
# =============================================================================

upstream auth_service           { server host.docker.internal:8081; }
upstream scene_config_service   { server host.docker.internal:8082; }
upstream device_manage_service  { server host.docker.internal:8083; }
upstream calibration_service    { server host.docker.internal:8084; }
upstream alarm_judge_service    { server host.docker.internal:8085; }
upstream alarm_rule_service     { server host.docker.internal:8086; }
upstream compare_dashboard_service { server host.docker.internal:8087; }
upstream drift_monitor_service  { server host.docker.internal:8089; }
upstream lowcode_workflow_service { server host.docker.internal:8094; }
upstream health_monitor_service { server host.docker.internal:8090; }
upstream stream_ingest_service  { server host.docker.internal:8097; }
upstream history_replay_service { server host.docker.internal:8101; }

server {
    listen 8079;
    server_name localhost;

    # 允许最大 2GB 请求体（视频上传）
    client_max_body_size 2048m;

    # 透传请求头（JWT Token 等）
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization     $http_authorization;

    # 超时配置
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # 视频上传专用超时（2GB 文件上传可能需要较长时间）
    location /api/v1/simulations/upload-video {
        proxy_pass         http://history_replay_service;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 2048m;
    }

    # ── 认证 ──────────────────────────────────────────────────────────────────
    location /api/v1/auth {
        proxy_pass http://auth_service;
    }

    # ── 标定（两种路径均路由到标定服务）─────────────────────────────────────────
    # 场景路径：/api/v1/scenes/{id}/calibrations
    location ~ ^/api/v1/scenes/[^/]+/calibrations {
        proxy_pass http://calibration_service;
    }
    # 前端直接路径：/api/v1/calibration/{sceneId}[/history] → 重写为 scenes 路径
    location ~ ^/api/v1/calibration/([^/]+)(/.*)?$ {
        rewrite ^/api/v1/calibration/([^/]+)(/.*)?$ /api/v1/scenes/$1/calibrations$2 break;
        proxy_pass http://calibration_service;
    }

    # ── 场景配置 ───────────────────────────────────────────────────────────────
    location /api/v1/scenes {
        proxy_pass http://scene_config_service;
    }

    # ── 设备管理 ───────────────────────────────────────────────────────────────
    location /api/v1/devices {
        proxy_pass http://device_manage_service;
    }

    # ── 告警判定 ───────────────────────────────────────────────────────────────
    location /api/v1/alarms {
        proxy_pass http://alarm_judge_service;
    }

    # ── 告警规则 / 模型版本 / 算法插件 ──────────────────────────────────────────
    location /api/v1/models {
        proxy_pass http://alarm_rule_service;
    }

    location /api/v1/plugins {
        proxy_pass http://alarm_rule_service;
    }

    # ── 算法插件（前端路径 /algorithms，后端控制器路径 /plugins）────────────────
    location /api/v1/algorithms {
        proxy_pass http://alarm_rule_service;
        rewrite ^/api/v1/algorithms(.*)$ /api/v1/plugins$1 break;
    }

    # ── 在线标定 ───────────────────────────────────────────────────────────────
    location /api/v1/calibration {
        proxy_pass http://calibration_service;
    }

    # ── 感知健康监控 ───────────────────────────────────────────────────────────
    location /api/v1/health-monitor {
        proxy_pass http://health_monitor_service;
    }

    # ── 对比看板 / Sandbox ──────────────────────────────────────────────────────
    location /api/v1/dashboard {
        proxy_pass http://compare_dashboard_service;
    }

    location /api/v1/sandbox {
        proxy_pass http://compare_dashboard_service;
    }

    # ── 漂移监测 / 审计 / 系统 / 训练 ───────────────────────────────────────────
    location /api/v1/drift {
        proxy_pass http://drift_monitor_service;
    }

    location /api/v1/audit {
        proxy_pass http://drift_monitor_service;
    }

    location /api/v1/system {
        proxy_pass http://auth_service;
    }

    location /api/v1/training {
        proxy_pass http://drift_monitor_service;
    }

    # ── 低代码编排 ─────────────────────────────────────────────────────────────
    location /api/v1/workflows {
        proxy_pass http://lowcode_workflow_service;
    }

    # ── 视频流 ─────────────────────────────────────────────────────────────────
    location /api/v1/streams {
        proxy_pass http://stream_ingest_service;
    }

    # ── 历史回溯 ───────────────────────────────────────────────────────────────
    location /api/v1/simulations {
        proxy_pass http://history_replay_service;
    }

    # ── 未匹配路径返回 404 ─────────────────────────────────────────────────────
    location / {
        return 404 '{"code":3001,"message":"路由未定义"}';
        add_header Content-Type application/json;
    }
}
