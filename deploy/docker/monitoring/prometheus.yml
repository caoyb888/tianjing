global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # GPU 推理服务（LOCAL-GPU-YOLO-V1，端口 8102）
  - job_name: 'gpu-infer-service'
    static_configs:
      - targets: ['localhost:8102']
    metrics_path: /metrics

  # 烧结看火分类推理服务（CLASSIFY-FLAME-V1，端口 8104，Docker 容器）
  - job_name: 'classify-flame-infer'
    static_configs:
      - targets: ['localhost:8104']
    metrics_path: /metrics

  # 告警判定服务（alarm-judge-service，端口 8085，Spring Boot Actuator）
  - job_name: 'alarm-judge-service'
    static_configs:
      - targets: ['localhost:8085']
    metrics_path: /actuator/prometheus

  # infer-dispatcher 未暴露 /metrics，暂不采集
