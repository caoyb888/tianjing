# =============================================================
# 天柱·天镜 工业视觉 AI 推理平台 — 本地开发 / 演示环境
# Docker Compose  |  适用：单机本地开发、功能演示
# =============================================================
#
# ⚠  CPU 兼容性说明（Intel Core 2 Duo T7700）
#    支持：SSE / SSE2 / SSE3 / SSSE3 / SSE4.2
#    不支持：AVX / AVX2 / AVX512 / AES-NI
#
# 镜像选型影响：
#   ❌ Elasticsearch 8.x   — 强依赖 AVX 指令，已从本文件移除
#   ⚠  MinIO              — RELEASE.2024+ 启用 AVX2，降为 2023-09 稳定版
#   ✅ PostgreSQL / Redis  — alpine 镜像，无 AVX 要求
#   ✅ Kafka / Nacos       — JVM 运行，无 CPU 扩展指令依赖
#   ✅ TDengine 3.x        — 运行时 SIMD 探测，SSE4.2 回退路径安全
#
# 使用方法：
#   cp .env.example .env
#   docker compose up -d
#   # 等待所有服务 healthy 后初始化 Kafka Topics：
#   docker compose run --rm kafka-init
# =============================================================

name: tianjing-dev

# ── 网络 ────────────────────────────────────────────────────
networks:
  tianjing-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

# ── 持久化卷 ─────────────────────────────────────────────────
volumes:
  pg-data:
  redis-data:
  kafka-data:
  minio-data:
  tdengine-data:
  nacos-data:

# ── 公共配置片段 ──────────────────────────────────────────────
x-common: &common
  restart: unless-stopped
  networks:
    - tianjing-net

# =============================================================
# 中间件服务
# =============================================================
services:

  # ── PostgreSQL 16 ─────────────────────────────────────────
  # alpine 镜像，无 AVX 要求，安全 ✅
  postgresql:
    <<: *common
    image: postgres:16-alpine
    container_name: tianjing-postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      # 以下变量供初始化脚本使用（envsubst）
      TIANJING_PROD_DB_PASSWORD: ${TIANJING_PROD_DB_PASSWORD}
      TIANJING_SANDBOX_DB_PASSWORD: ${TIANJING_SANDBOX_DB_PASSWORD}
      TIANJING_TRAIN_DB_PASSWORD: ${TIANJING_TRAIN_DB_PASSWORD}
      NACOS_DB_PASSWORD: ${NACOS_DB_PASSWORD}
      # 本地开发调优（降低内存占用）
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=4MB
        -c log_min_duration_statement=2000
    volumes:
      - pg-data:/var/lib/postgresql/data
      # 初始化脚本：建库、建用户、导入 Flyway Schema
      - ./init/postgres/00_create_databases.sh:/docker-entrypoint-initdb.d/00_create_databases.sh:ro
      # Flyway SQL 文件（供 init 脚本使用）
      - ../../deploy/flyway:/flyway:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Redis 7 ───────────────────────────────────────────────
  # alpine 镜像，无 AVX 要求，安全 ✅
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: tianjing-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Apache Kafka 3.6 (KRaft 模式，无 ZooKeeper) ───────────
  # JVM 运行，无 AVX 要求，安全 ✅
  # KRaft：单节点，本地开发不需要副本
  # 注：bitnami/kafka 国内镜像不可用，改用 Confluent cp-kafka:7.6.0（内核 Kafka 3.6.x）
  kafka:
    <<: *common
    image: confluentinc/cp-kafka:7.6.0
    container_name: tianjing-kafka
    ports:
      - "9092:9092"   # 容器内部通信（其他服务使用）
      - "9094:9094"   # 宿主机直连（本地调试工具）
    environment:
      # KRaft 模式（cp-kafka 环境变量前缀为 KAFKA_）
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID}
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 536870912

      # JVM 内存
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      # cp-kafka 必须项
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ── Kafka Topics 初始化（一次性任务）────────────────────────
  # Confluent 镜像命令名为 kafka-topics（Bitnami 为 kafka-topics.sh），先建软链兼容
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: tianjing-kafka-init
    networks:
      - tianjing-net
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      REPLICATION_FACTOR: "1"
    volumes:
      - ../../scripts/kafka-topics-init.sh:/scripts/kafka-topics-init.sh:ro
    entrypoint:
      - bash
      - -c
      - |
        mkdir -p /tmp/bin
        printf '#!/bin/bash\nexec /usr/bin/kafka-topics "$@"\n' > /tmp/bin/kafka-topics.sh
        chmod +x /tmp/bin/kafka-topics.sh
        export PATH=/tmp/bin:$PATH
        bash /scripts/kafka-topics-init.sh

  # ── Nacos 2.4.3 ────────────────────────────────────────────
  # JVM 运行，无 AVX 要求，安全 ✅
  # 本地演示使用 standalone + 内置 Derby（无需独立 DB）
  # 注：v2.3.2 国内镜像不可用，使用本地已有的 v2.4.3（API 兼容）
  nacos:
    <<: *common
    image: nacos/nacos-server:v2.4.3
    container_name: tianjing-nacos
    ports:
      - "8848:8848"   # HTTP 控制台 / OpenAPI
      - "9848:9848"   # gRPC（服务端）
      - "9849:9849"   # gRPC（集群通信，standalone 模式不用但保留端口）
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
      # 鉴权（演示环境关闭）
      NACOS_AUTH_ENABLE: "false"
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8848/nacos/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ── MinIO ──────────────────────────────────────────────────
  # ⚠  RELEASE.2024+ 编译时启用 AVX2，当前 CPU 不支持
  #    使用本地已有的 RELEASE.2023-03-20（Go 1.20，无 AVX2 强依赖）✅
  #    项目要求 RELEASE.2024+，待升级 CPU/服务器后可换回
  minio:
    <<: *common
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: tianjing-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web 控制台
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── MinIO Bucket 初始化（一次性任务）────────────────────────
  # minio/mc:latest 基于 Ubuntu 22.04，glibc 要求 x86-64-v2（需 POPCNT+SSE4.1）
  # 改用 python:3.11-alpine（musl libc，无 x86-64-v2 要求）✅
  minio-init:
    image: python:3.11-alpine
    container_name: tianjing-minio-init
    networks:
      - tianjing-net
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./init/minio/create_buckets.py:/scripts/create_buckets.py:ro
    entrypoint:
      - sh
      - -c
      - |
        pip install -q --index-url https://pypi.tuna.tsinghua.edu.cn/simple minio
        python3 /scripts/create_buckets.py

  # ── TDengine 3.3.2.0 ──────────────────────────────────────
  # 运行时 SIMD 检测：AVX2 不可用时自动回退至 SSE4.2 ✅
  tdengine:
    <<: *common
    image: tdengine/tdengine:3.3.2.0
    container_name: tianjing-tdengine
    ports:
      - "6030:6030"   # 原生连接（taosc / JDBC-JNI）
      - "6041:6041"   # RESTful API（HTTP / WebSocket）
    environment:
      TAOS_FQDN: tdengine
      # 本地开发降配
      TAOS_NUM_OF_COMMIT_THREADS: 2
      TAOS_CACHE_LAST: 2
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - tdengine-data:/var/lib/taos
    healthcheck:
      # REST API 健康检查：比本地 socket 更准确，反映 mnode 真正就绪
      test: ["CMD-SHELL", "curl -sf -u root:taosdata -X POST http://localhost:6041/rest/sql -d 'show databases;' | grep -q '\"code\":0' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s

  # ── TDengine 超级表初始化（一次性任务）──────────────────────
  # taosd native TCP（6030）在 Docker 跨容器场景不稳定
  # 改用 REST API（6041）+ Python Alpine（musl libc，无 x86-64-v2 要求）
  tdengine-init:
    image: python:3.11-alpine
    container_name: tianjing-tdengine-init
    networks:
      - tianjing-net
    depends_on:
      tdengine:
        condition: service_healthy
    restart: "no"
    environment:
      TDENGINE_HOST: tdengine
      TDENGINE_PORT: "6041"
      SQL_FILE: /scripts/tdengine-init.sql
    volumes:
      - ../../scripts/tdengine-init.sql:/scripts/tdengine-init.sql:ro
      - ./init/tdengine/init_schema.py:/scripts/init_schema.py:ro
    entrypoint: ["python3", "/scripts/init_schema.py"]
