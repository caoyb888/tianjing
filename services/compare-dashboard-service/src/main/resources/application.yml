server:
  port: 8087

spring:
  application:
    name: compare-dashboard-service
  datasource:
    url: ${TIANJING_POSTGRES_SANDBOX_URL:jdbc:postgresql://localhost:5432/tianjing_sandbox}
    username: ${TIANJING_POSTGRES_SANDBOX_USER:tianjing_sandbox_app}
    password: ${TIANJING_POSTGRES_SANDBOX_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${TIANJING_REDIS_HOST:localhost}
      port: ${TIANJING_REDIS_PORT:6379}
      password: ${TIANJING_REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${TIANJING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

tianjing:
  jwt:
    public-key-pem: ${TIANJING_JWT_PUBLIC_KEY_PEM:}
  prod-db:
    url: ${TIANJING_POSTGRES_PROD_URL:jdbc:postgresql://localhost:5432/tianjing_prod}
    username: ${TIANJING_POSTGRES_PROD_USER:tianjing_prod_user}
    password: ${TIANJING_POSTGRES_PROD_PASSWORD:prod_user_dev_2024}

management:
  endpoints:
    web:
      exposure:
        include: health,info
