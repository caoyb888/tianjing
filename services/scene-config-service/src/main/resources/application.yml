server:
  port: 8082

spring:
  application:
    name: scene-config-service
  datasource:
    url: ${TIANJING_POSTGRES_PROD_URL:jdbc:postgresql://localhost:5432/tianjing_prod}
    username: ${TIANJING_POSTGRES_PROD_USER:tianjing_app}
    password: ${TIANJING_POSTGRES_PROD_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
  data:
    redis:
      host: ${TIANJING_REDIS_HOST:localhost}
      port: ${TIANJING_REDIS_PORT:6379}
      password: ${TIANJING_REDIS_PASSWORD:}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

tianjing:
  jwt:
    public-key-pem: ${TIANJING_JWT_PUBLIC_KEY_PEM:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.tianzhu.tianjing: DEBUG
