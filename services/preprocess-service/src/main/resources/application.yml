server:
  port: 8099

spring:
  application:
    name: preprocess-service
  kafka:
    bootstrap-servers: ${TIANJING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

tianjing:
  jwt:
    public-key-pem: ${TIANJING_JWT_PUBLIC_KEY_PEM:}
  preprocess:
    dehaze-strength: ${TIANJING_PREPROCESS_DEHAZE_STRENGTH:0.6}
    enable-clahe:    ${TIANJING_PREPROCESS_ENABLE_CLAHE:true}
