server:
  port: 8086

spring:
  application:
    name: alarm-rule-service
  datasource:
    url: ${TIANJING_POSTGRES_PROD_URL:jdbc:postgresql://localhost:5432/tianjing_prod}
    username: ${TIANJING_POSTGRES_PROD_USER:tianjing_app}
    password: ${TIANJING_POSTGRES_PROD_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${TIANJING_REDIS_HOST:localhost}
      port: ${TIANJING_REDIS_PORT:6379}
      password: ${TIANJING_REDIS_PASSWORD:}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: "true"
      logic-not-delete-value: "false"

tianjing:
  jwt:
    public-key-pem: ${TIANJING_JWT_PUBLIC_KEY_PEM:}
  inference:
    proxy-url: ${TIANJING_INFERENCE_PROXY_URL:http://localhost:8092}
  sandbox:
    # Sandbox 最低验证时长（小时）。生产值 48；Sprint3 测试时注入 TIANJING_SANDBOX_MIN_HOURS=0 绕过门禁。
    min-hours: ${TIANJING_SANDBOX_MIN_HOURS:48}

management:
  endpoints:
    web:
      exposure:
        include: health,info
