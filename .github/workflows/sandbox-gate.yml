# ============================================================
# Sandbox 转正门禁流水线
# Sprint：S0-06
# 触发：人工触发（workflow_dispatch）或模型转正申请事件
# 门禁：精度 / 资源 / 延迟 / 人工审核（四眼原则）
# ============================================================

name: Sandbox 转正门禁

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Sandbox 会话 ID（如 SB-SCENE-SINTER-FIRE-001-202604151030）'
        required: true
      scene_id:
        description: '场景 ID（如 SCENE-SINTER-FIRE-001）'
        required: true
      candidate_model_version:
        description: '候选模型版本 ID（如 MV-CLOUD-PROXY-V1-20260415-001）'
        required: true

jobs:
  sandbox-gate-check:
    name: Sandbox 转正门禁校验
    runs-on: ubuntu-latest
    environment: sandbox-promote  # 需要至少 2 名 MODEL_REVIEWER 审批
    steps:
      - uses: actions/checkout@v4

      - name: 获取对比报告
        id: report
        run: |
          REPORT=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            "http://tianjing-compare.production.svc.cluster.local/api/v1/sandbox/sessions/${{ inputs.session_id }}/report" \
            2>/dev/null || echo '{"error": "API not available"}')
          echo "report=${REPORT}" >> $GITHUB_OUTPUT

      - name: 门禁 1：Sandbox 验证时长（≥ 48 小时）
        run: |
          HOURS=$(echo '${{ steps.report.outputs.report }}' | jq -r '.hours_evaluated // 0')
          echo "验证时长: ${HOURS} 小时"
          if [ "${HOURS}" -lt 48 ]; then
            echo "::error::门禁失败：Sandbox 验证时长 ${HOURS}h < 48h（要求）"
            exit 1
          fi
          echo "✓ 时长门禁通过: ${HOURS}h >= 48h"

      - name: 门禁 2：精度提升（≥ 生产模型 * 1.02）
        run: |
          SANDBOX_PRECISION=$(echo '${{ steps.report.outputs.report }}' | jq -r '.sandbox_precision // 0')
          PROD_PRECISION=$(echo '${{ steps.report.outputs.report }}' | jq -r '.prod_precision // 0')
          DELTA=$(echo '${{ steps.report.outputs.report }}' | jq -r '.precision_delta // -1')
          echo "Sandbox精度: ${SANDBOX_PRECISION}，生产精度: ${PROD_PRECISION}，提升: ${DELTA}"
          REQUIRED=$(echo "${PROD_PRECISION} * 1.02" | bc -l)
          if (( $(echo "${SANDBOX_PRECISION} < ${REQUIRED}" | bc -l) )); then
            echo "::error::门禁失败：精度提升不足。Sandbox=${SANDBOX_PRECISION} < 生产*1.02=${REQUIRED}"
            exit 1
          fi
          echo "✓ 精度门禁通过: ${SANDBOX_PRECISION} >= ${REQUIRED}"

      - name: 门禁 3：GPU 显存消耗（≤ 生产模型 * 1.1）
        run: |
          SANDBOX_GPU=$(echo '${{ steps.report.outputs.report }}' | jq -r '.sandbox_gpu_mb // 0')
          PROD_GPU=$(echo '${{ steps.report.outputs.report }}' | jq -r '.prod_gpu_mb // 1')
          echo "Sandbox显存: ${SANDBOX_GPU}MB，生产显存: ${PROD_GPU}MB"
          if [ "${PROD_GPU}" -gt 0 ]; then
            LIMIT=$(echo "${PROD_GPU} * 1.1" | bc)
            if (( $(echo "${SANDBOX_GPU} > ${LIMIT}" | bc -l) )); then
              echo "::error::门禁失败：GPU显存 ${SANDBOX_GPU}MB > 限制 ${LIMIT}MB"
              exit 1
            fi
          fi
          echo "✓ 资源门禁通过"

      - name: 门禁 4：P99 推理延迟（≤ 生产模型 * 1.2）
        run: |
          SANDBOX_P99=$(echo '${{ steps.report.outputs.report }}' | jq -r '.sandbox_p99_ms // 0')
          PROD_P99=$(echo '${{ steps.report.outputs.report }}' | jq -r '.prod_p99_ms // 1')
          echo "Sandbox P99: ${SANDBOX_P99}ms，生产 P99: ${PROD_P99}ms"
          if [ "${PROD_P99}" -gt 0 ]; then
            LIMIT=$(echo "${PROD_P99} * 1.2" | bc)
            if (( $(echo "${SANDBOX_P99} > ${LIMIT}" | bc -l) )); then
              echo "::error::门禁失败：推理延迟 P99 ${SANDBOX_P99}ms > 限制 ${LIMIT}ms"
              exit 1
            fi
          fi
          echo "✓ 延迟门禁通过"

      - name: 更新转正申请状态（门禁通过）
        run: |
          echo "所有门禁通过，通知平台进行人工审核"
          # 此 step 成功执行表示等待人工审核（environment 审批）
          echo "Session: ${{ inputs.session_id }}"
          echo "Scene: ${{ inputs.scene_id }}"
          echo "Candidate: ${{ inputs.candidate_model_version }}"

  # 人工审核步骤（四眼原则：需要 2 名 MODEL_REVIEWER 在 GitHub environment 中批准）
  human-review:
    name: 人工审核（四眼原则）
    runs-on: ubuntu-latest
    needs: sandbox-gate-check
    environment: model-production-approve  # 配置需要至少 2 人审批
    steps:
      - name: 执行模型转正
        run: |
          echo "人工审核通过，执行模型转正..."
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"session_id":"${{ inputs.session_id }}", "approver":"${{ github.actor }}"}' \
            "http://tianjing-compare.production.svc.cluster.local/api/v1/sandbox/sessions/${{ inputs.session_id }}/promote" \
            2>/dev/null || echo "API 调用失败（开发环境正常）"
          echo "✓ 模型转正流程完成"
